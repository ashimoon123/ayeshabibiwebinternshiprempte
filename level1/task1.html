<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact form · Task 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f6f9fc 0%, #e9f1f8 100%);
            padding: 1.5rem;
        }

        .contact-card {
            max-width: 680px;
            width: 100%;
            background: #ffffff;
            border-radius: 2.5rem;
            padding: 2.5rem 2.8rem 3rem;
            box-shadow: 0 30px 50px -20px rgba(0, 20, 40, 0.25),
                        0 10px 20px -8px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .contact-card:hover {
            transform: scale(1.003);
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2.2rem;
        }

        .form-header i {
            font-size: 2.2rem;
            color: #2a7de1;
            background: rgba(42, 125, 225, 0.08);
            padding: 0.6rem;
            border-radius: 1.2rem;
        }

        .form-header h2 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0b1e33;
            margin: 0;
        }

        .form-header span {
            color: #5b6f87;
            font-weight: 400;
            font-size: 0.95rem;
            margin-left: 0.3rem;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .input-group label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #1f3349;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .input-group label i {
            font-size: 0.9rem;
            color: #2a7de1;
            width: 1.2rem;
        }

        .input-group label .required {
            color: #d14545;
            font-weight: 600;
            margin-left: 0.1rem;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            background: #f5f9ff;
            border: 1.5px solid #e0e9f2;
            border-radius: 1.2rem;
            transition: all 0.2s ease;
            color: #0b1e33;
            outline: none;
            font-weight: 450;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #2a7de1;
            background: #ffffff;
            box-shadow: 0 4px 12px rgba(42, 125, 225, 0.12);
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: #94a9c2;
            font-weight: 350;
            font-size: 0.95rem;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 140px;
            line-height: 1.5;
        }

        .row-duo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        .consent-group {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            margin: 0.2rem 0 0.2rem;
        }

        .consent-group input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: #2a7de1;
            margin-top: 0.2rem;
            flex-shrink: 0;
            border-radius: 6px;
            border: 1.5px solid #b8cbe0;
        }

        .consent-group label {
            font-size: 0.9rem;
            color: #2d4059;
            line-height: 1.4;
        }

        .consent-group label a {
            color: #2a7de1;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dotted #b0cbe7;
        }

        .consent-group label a:hover {
            border-bottom: 1px solid #2a7de1;
        }

        .submit-btn {
            background: #1a3a5e;
            color: white;
            border: none;
            padding: 1rem 1.8rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 2.5rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            transition: 0.2s ease;
            margin-top: 0.25rem;
            box-shadow: 0 10px 18px -8px rgba(26, 58, 94, 0.25);
            letter-spacing: 0.3px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .submit-btn i {
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }

        .submit-btn:hover {
            background: #0f2a44;
            transform: translateY(-3px);
            box-shadow: 0 18px 28px -12px rgba(18, 52, 94, 0.35);
        }

        .submit-btn:hover i {
            transform: translateX(4px);
        }

        .submit-btn:active {
            transform: scale(0.97);
            background: #0f2a44;
        }

        .form-footnote {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: #657b95;
            text-align: center;
            border-top: 1px solid #eaf0f6;
            padding-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .form-footnote i {
            color: #2a7de1;
            margin-right: 0.3rem;
        }

        .form-footnote span {
            background: #f2f8ff;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-weight: 450;
        }

        @media (max-width: 550px) {
            .contact-card {
                padding: 1.8rem 1.2rem 2.2rem;
                border-radius: 1.8rem;
            }
            .row-duo {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
            .form-header h2 {
                font-size: 1.6rem;
            }
            .form-header i {
                font-size: 1.8rem;
                padding: 0.4rem;
            }
        }

        .demo-hint {
            background: #ecf5fe;
            border-radius: 30px;
            padding: 0.2rem 1rem;
            font-size: 0.75rem;
            color: #1d4f7a;
            display: inline-block;
            margin-left: 0.4rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="contact-card">
    <div class="form-header">
        <i class="fas fa-envelope-open-text"></i>
        <h2>Contact <span>us</span></h2>
        <span class="demo-hint"><i class="fas fa-pen-fancy"></i> Task 1</span>
    </div>

    <form class="contact-form" id="contactForm" action="#" method="POST">
        <div class="row-duo">
            <div class="input-group">
                <label for="fullName">
                    <i class="fas fa-user"></i> Full name <span class="required">*</span>
                </label>
                <input type="text" id="fullName" name="fullName" placeholder="e.g. Jane Cooper" required />
            </div>
            <div class="input-group">
                <label for="emailAddress">
                    <i class="fas fa-envelope"></i> Email <span class="required">*</span>
                </label>
                <input type="email" id="emailAddress" name="emailAddress" placeholder="hello@example.com" required />
            </div>
        </div>

        <div class="input-group">
            <label for="subjectLine">
                <i class="fas fa-tag"></i> Subject <span class="required">*</span>
            </label>
            <input type="text" id="subjectLine" name="subjectLine" placeholder="What is this about?" required />
        </div>

        <div class="input-group">
            <label for="messageContent">
                <i class="fas fa-comment-dots"></i> Message <span class="required">*</span>
            </label>
            <textarea id="messageContent" name="messageContent" placeholder="Write your message here…" required></textarea>
        </div>

        <div class="consent-group">
            <input type="checkbox" id="privacyConsent" name="privacyConsent" required />
            <label for="privacyConsent">
                I agree that my data may be stored and used to respond to this message.
                <a href="#" onclick="event.preventDefault(); alert('Privacy policy would open here.');">Privacy policy</a>
            </label>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
            <i class="fas fa-paper-plane"></i> Send message
        </button>

        <div class="form-footnote">
            <span><i class="fas fa-shield-alt"></i> Encrypted</span>
            <span><i class="fas fa-clock"></i> Response within 24h</span>
        </div>
    </form>
</div>

<script>
    (function() {
        const form = document.getElementById('contactForm');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('emailAddress').value.trim();
            const subject = document.getElementById('subjectLine').value.trim();
            const message = document.getElementById('messageContent').value.trim();
            const consent = document.getElementById('privacyConsent').checked;

            if (!name || !email || !subject || !message || !consent) {
                alert('⚠️ Please fill in all required fields and accept the privacy policy.');
                return;
            }

            const formData = {
                fullName: name,
                emailAddress: email,
                subjectLine: subject,
                messageContent: message,
                privacyConsent: consent,
                timestamp: new Date().toISOString()
            };

            alert(`✅ Message sent successfully! (demo)\n\n📬 Valid data:\n${JSON.stringify(formData, null, 2)}`);
            console.log('✅ Contact form data (valid):', formData);
        });
    })();
</script>

</body>
</html>
