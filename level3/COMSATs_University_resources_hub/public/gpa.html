<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator - COMSATS Resource Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a class="navbar-brand" href="index.html">COMSATS Resource Hub</a>
            <div class="nav-links">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="notes.html">Notes</a>
                <a class="nav-link" href="lectures.html">Lectures</a>
                <a class="nav-link" href="pastpapers.html">Past Papers</a>
                <a class="nav-link active" href="gpa.html">GPA Calculator</a>
                <a class="nav-link" href="forum.html">Forum</a>
            </div>
            <div class="nav-actions">
                <a class="btn btn-primary" href="login.html">Login</a>
                <a class="btn btn-outline" href="register.html">Register</a>
            </div>
        </div>
    </nav>

    <section class="page">
        <div class="container">
            <h1 class="page-title">🔢 GPA Calculator</h1>
            
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Enter Your Subjects & Grades</h3>
                
                <table id="gpaTable">
                    <thead>
                        <tr>
                            <th>Subject Name</th>
                            <th>Credit Hours</th>
                            <th>Grade</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="gpaTableBody">
                    </tbody>
                </table>
                
                <div style="margin-top:1.5rem; display: flex; gap: 1rem;">
                    <button class="add-btn" onclick="addSubject()">+ Add Subject</button>
                    <button class="btn btn-primary" onclick="calculateGPA()">Calculate GPA</button>
                    <button class="btn btn-outline" onclick="clearAll()">Clear All</button>
                </div>
            </div>

            <div class="gpa-result" id="gpaResult" style="display: none;">
                <h3>Your GPA is:</h3>
                <div class="gpa-value" id="gpaValue">0.00</div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p class="footer-text">© 2024 COMSATS University Resource Hub. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const gradePoints = {
            'A+': 4.00,
            'A': 4.00,
            'A-': 3.67,
            'B+': 3.33,
            'B': 3.00,
            'B-': 2.67,
            'C+': 2.33,
            'C': 2.00,
            'C-': 1.67,
            'D+': 1.33,
            'D': 1.00,
            'F': 0.00
        };

        function addSubject() {
            const tbody = document.getElementById('gpaTableBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="form-input" placeholder="e.g., CS101" style="width: 100%;"></td>
                <td>
                    <select class="form-select" style="width: 100%;">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3" selected>3</option>
                        <option value="4">4</option>
                    </select>
                </td>
                <td>
                    <select class="form-select grade-select" style="width: 100%;">
                        <option value="A+">A+</option>
                        <option value="A">A</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B">B</option>
                        <option value="B-">B-</option>
                        <option value="C+">C+</option>
                        <option value="C">C</option>
                        <option value="C-">C-</option>
                        <option value="D+">D+</option>
                        <option value="D">D</option>
                        <option value="F">F</option>
                    </select>
                </td>
                <td><button class="btn btn-outline" onclick="removeSubject(this)">Remove</button></td>
            `;
            tbody.appendChild(row);
        }

        function removeSubject(btn) {
            btn.closest('tr').remove();
        }

        function clearAll() {
            document.getElementById('gpaTableBody').innerHTML = '';
            document.getElementById('gpaResult').style.display = 'none';
        }

        function calculateGPA() {
            const tbody = document.getElementById('gpaTableBody');
            const rows = tbody.querySelectorAll('tr');
            if (rows.length === 0) {
                alert('Please add at least one subject!');
                return;
            }

            let totalPoints = 0;
            let totalCredits = 0;
            rows.forEach(row => {
                const credits = parseFloat(row.querySelectorAll('select')[0].value);
                const grade = row.querySelectorAll('select')[1].value;
                const points = gradePoints[grade];
                
                totalCredits += parseFloat(credits);
                totalPoints += parseFloat(credits * points);
            });
            
            const gpa = totalPoints / totalCredits;
            
            document.getElementById('gpaValue').textContent = gpa.toFixed(2);
            document.getElementById('gpaResult').style.display = 'block';
        }

        // Add 3 default subjects
        addSubject();
        addSubject();
        addSubject();
    </script>
</body>
</html>
