<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMSATS Resource Hub - Working</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 700px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .status {
            font-size: 1.5rem;
            color: #10b981;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .features {
            margin: 30px 0;
            text-align: left;
            padding: 20px;
            background: #f8fafc;
            border-radius: 10px;
        }
        .feature {
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .feature:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 COMSATS University Resource Hub</h1>
        <p class="status">✅ Page is WORKING!</p>
        
        <div class="features">
            <h3 style="margin-bottom:15px; color:#334155;">Features:</h3>
            <div class="feature">📚 Notes Sharing</div>
            <div class="feature">🎥 Recorded Lectures</div>
            <div class="feature">📄 Past Papers</div>
            <div class="feature">🔢 GPA Calculator</div>
            <div class="feature">💬 Discussion Forum</div>
        </div>

        <p style="color:#64748b; margin-top:20px;">Server running on Port 8080</p>
    </div>
</body>
</html>
